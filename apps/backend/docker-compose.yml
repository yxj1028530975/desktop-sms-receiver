services:
  sms-backend:
    container_name: sms-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MAIN_MIRROR: ${APT_MAIN_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
        UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-https://pypi.tuna.tsinghua.edu.cn/simple}
        UV_HTTP_TIMEOUT: ${UV_HTTP_TIMEOUT:-180}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: sqlite:////app/data/sms.db
      LOG_DIR: /app/logs
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
